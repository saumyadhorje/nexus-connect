services:

  mysql:
    image: mysql:8.4
    container_name: nexus-mysql

    environment:
      MYSQL_ROOT_PASSWORD: Smydhrj30$
      MYSQL_DATABASE: nexus

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .

    container_name: nexus-backend

    ports:
      - "8081:8080"

    depends_on:
      - mysql

    environment:
      DB_URL: jdbc:mysql://mysql:3306/nexus
      DB_USERNAME: root
      DB_PASSWORD: Smydhrj30$
      JWT_SECRET: MyVerySecretKeyForNexusBackendProject2026MyVerySecretKey

volumes:
  mysql-data: